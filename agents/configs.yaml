agents:
  data_agent:
    role: Financial Data Processor
    goal: Clean and structure transaction data
    backstory: >
      You are an expert in parsing bank statements, cleaning financial datasets,
      and ensuring structured, consistent outputs.
    verbose: true
  analysis_agent:
    role: Financial Analyst
    goal: Analyze user transactions and categorize spending
    backstory: >
      You specialize in personal finance analytics, identifying spending
      patterns, categorizing transactions, and detecting financial behavior
      trends.
    verbose: true
  risk_agent:
    role: Risk Evaluator
    goal: Determine the user's financial risk profile
    backstory: >
      You are a certified financial risk advisor who evaluates user profiles and
      determines investment risk tolerance.
    verbose: true
  advisory_agent:
    role: Financial Advisor
    goal: Provide financial recommendations and strategies
    backstory: >
      You are a professional investment advisor helping users optimize savings,
      investments, and debt management.
    verbose: true
  review_agent:
    role: Expert reviewer of financial data
    goal: 'Consolidate analysis, risk and advisory data'
    backstory: >
      You are a expert reviewer of financial data helping to consolidate
      financial analysis , risk and advisory data
    verbose: true
  qa_agent:
    role: Financial Assistant
    goal: Answer user financial queries accurately
    backstory: >
      You are a helpful AI assistant capable of answering financial queries with
      clear, actionable insights based on user data.
    verbose: true
tasks:
  data_task:
    description: >
      Process the given transaction dataset.

      Steps: 1. Extract transactions with fields: date, amount, merchant 2.
      Remove duplicate records 3. Normalize amounts (consistent currency and
      format) 4. Handle missing or invalid entries

      Output JSON: [
        {
          "date": "YYYY-MM-DD",
          "amount": 1000,
          "merchant": "Amazon"
        }
      ]
    expected_output: Cleaned structured transaction dataset
    agent: data_agent
  analysis_task:
    description: >
      Analyze financial transactions and categorize expenses.
      Steps: 1. Categorize into:
        - Food, Rent, Travel, EMI, Shopping, Utilities
      2. Identify:
        - Monthly spending trends
        - Top 3 expense categories
        - Unusual spikes

      Output JSON: {
        "categories": ["Food", "Rent"],
        "values": [30, 40],
        "insights": [
          "Food expenses are high",
          "Significant increase in travel spending"
        ]
      }
    expected_output: Categorized expenses with insights
    agent: analysis_agent
  risk_task:
    description: >
      Evaluate the user's financial risk profile.

      Inputs: - Age - Salary - Investments - Loans

      Rules: - High loans compared to income → Conservative - Younger age with
      high savings → Aggressive - Otherwise → Moderate

      Output JSON: {
        "risk_profile": "Moderate",
        "justification": "Balanced income and moderate liabilities"
      }
    expected_output: User risk classification
    agent: risk_agent
  advisory_task:
    description: >
      Provide financial advice based on transaction analysis and risk profile.

      Steps: 1. Suggest savings improvements 2. Recommend investment allocation
      3. Provide debt reduction strategies

      Output JSON: {
        "advice": [
          "Invest 20% of income in mutual funds",
          "Reduce discretionary spending by 10%",
          "Build an emergency fund of 6 months salary"
        ]
      }
    expected_output: Financial advisory recommendations
    agent: advisory_agent
    context:
      - risk_task
      - analysis_task
  review_task:
    description: >
      Consolidate outputs from all agents into below given format.
      Output JSON: {
        "categories": ["Food", "Rent"],
        "values": [30, 40],
        "insights": [
          "Food expenses are high",
          "Significant increase in travel spending"
        ],
        "risk_profile": "Moderate",
        "justification": "Balanced income and moderate liabilities",
        "advice": [
          "Invest 20% of income in mutual funds",
          "Reduce discretionary spending by 10%",
          "Build an emergency fund of 6 months salary"
        ]
      }
    expected_output: 'Financial Analysis,Risk and Advise'
    agent: review_agent
    context:
      - risk_task
      - analysis_task
      - advisory_task
  qa_task:
    description: >
      Answer user financial queries.

      User Query: {query}

      User Financial Profile: - Age: {age} - Salary: {salary} - Investments:
      {investments} - Loans: {loans}

      Instructions: 
      - First determine if the question is related to finance.
      - Consider ANY query about salary, income, savings, investments, loans, or profile details as financial. 
      - If the user asks about their own financial data (e.g., salary, investments, loans):
        - Directly fetch from provided inputs
        - Do NOT generate advice unnecessarily
        - Answer clearly with the value

      - If the question is financial:
          - Use the user's financial profile and analysis data
          - Provide personalized financial advice
      - If the question is NOT financial:
          - Clearly state that you are a financial assistant and can only help with finance-related queries
          - Offer to help with financial questions instead
      - ALWAYS use the provided financial profile - DO NOT ask the user again
      for financial details - Provide a direct and actionable answer     -
      Format answer in clean paragraphs - Use bullet points for advice - Avoid
      broken words or spacing issues - Ensure numbers are properly formatted
      (e.g., 20,000) - Use BOTH profile and spending data - Identify
      overspending patterns - Give personalized advice - DO NOT ask for data
      again
    expected_output: Answer to user query
    agent: qa_agent
    context:
      - review_task
crews:
  fianncial_analysis_crew:
    name: Financial Analysis Crew
    agents:
      - data_agent
      - analysis_agent
      - risk_agent
      - advisory_agent
      - review_agent
    tasks:
      - data_task
      - analysis_task
      - risk_task
      - advisory_task
      - review_task
    process: sequential
    verbose: true
  fianncial_qa_crew:
    name: Financial QNA Crew
    agents:
      - qa_agent
    tasks:
      - qa_task
    process: sequential
    verbose: true