agents:
  data_agent:
    role: Financial Data Processor
    goal: Clean and structure transaction data
    backstory: >
      Expert in parsing bank statements and cleaning financial datasets.
    verbose: true

  analysis_agent:
    role: Financial Analyst
    goal: Analyze transactions and categorize spending
    backstory: >
      Specialist in identifying spending patterns and financial trends.
    verbose: true

  risk_agent:
    role: Risk Evaluator
    goal: Determine financial risk profile
    backstory: >
      Certified financial advisor assessing risk tolerance.
    verbose: true

  advisory_agent:
    role: Financial Advisor
    goal: Provide recommendations
    backstory: >
      Experienced advisor in savings, investments and debt optimization.
    verbose: true

  review_agent:
    role: Financial Output Consolidator
    goal: Merge all outputs into structured response
    backstory: >
      Expert reviewer consolidating analysis, risk, and advisory outputs.
    verbose: true

  qa_agent:
    role: Financial Assistant
    goal: Answer financial queries using user data
    backstory: >
      AI assistant providing clear and personalized financial insights.
    verbose: true


tasks:
  data_task:
    description: >
      Process transaction dataset.

      Steps:
      1. Extract: date, amount, merchant
      2. Remove duplicates
      3. Normalize amounts
      4. Handle missing values

      Output JSON:
      [
        {"date": "YYYY-MM-DD", "amount": 1000, "merchant": "Amazon"}
      ]
    expected_output: Clean transaction dataset
    agent: data_agent


  analysis_task:
    description: >
      Categorize spending and analyze trends.

      Categories:
      - Food, Rent, Travel, EMI, Shopping, Utilities

      Identify:
      - Monthly trends
      - Top 3 categories
      - Unusual spikes

      Output JSON:
      {
        "categories": ["Food", "Rent"],
        "values": [30, 40],
        "insights": ["Food expenses are high"]
      }
    expected_output: Expense analysis
    agent: analysis_agent

  risk_task:
    description: >
      Evaluate the user's financial risk profile.

      Inputs:
      - Age
      - Salary
      - Investments
      - Loans
      - Analysis Data (categories, spending patterns)

      Rules:
      - High loans compared to income → Conservative
      - High savings rate (Fixed Deposits, Insurance-heavy) → Conservative
      - High essential expenses (Rent, Medical, Utilities) → Conservative
      - Younger age with high discretionary spending → Aggressive
      - Otherwise → Moderate

      Output JSON:
      {
        "risk_profile": "...",
        "justification": "Explain using BOTH profile and spending behavior"
      }

    expected_output: Risk classification
    agent: risk_agent   # ✅ FIXED (this was missing!)
    context:
      - analysis_task
 

  advisory_task:
    description: >
      Provide financial advice.

      Use:
      - Spending analysis
      - Risk profile

      Output JSON:
      {
        "advice": [
          "Invest 20% of income",
          "Reduce spending"
        ]
      }
    expected_output: Financial advice
    agent: advisory_agent
    context:
      - risk_task
      - analysis_task


  review_task:
    description: >
      Consolidate ALL outputs.

      Output JSON:
      {
        "categories": [],
        "values": [],
        "insights": [],
        "risk_profile": "",
        "justification": "",
        "advice": []
      }
    expected_output: Final financial output
    agent: review_agent
    context:
      - risk_task
      - analysis_task
      - advisory_task


  qa_task:
    description: >
      Answer user financial queries.

      User Query: {query}

      Profile:
      - Age: {age}
      - Salary: {salary}
      - Investments: {investments}
      - Loans: {loans}

      Analysis Data:
      {analysis-data}

      RULES:

      1. Classification:
      - Treat salary, income, investments, loans as financial
      - If unclear → assume financial

      2. Direct Data Questions:
      - If user asks: "my salary", "my loans", etc:
        → Respond directly from profile
        → Do NOT add unnecessary advice

      Examples:
      Q: What is my salary?
      A: Your current salary is ₹{salary}.

      Q: How much do I earn?
      A: You earn ₹{salary} per month.

      3. Financial Advice Questions:
      - Use BOTH profile + analysis data
      - Identify overspending
      - Give bullet-point recommendations

      4. Non-Financial Queries:
      - Politely decline and redirect

      5. Strict Rules:
      - NEVER ask user for data again
      - ALWAYS use given inputs
      - Format cleanly
      - Use proper numbers (₹20,000)

    expected_output: Financial answer
    agent: qa_agent
    context:
      - review_task


crews:
  financial_analysis_crew:   
    name: Financial Analysis Crew
    agents:
      - data_agent
      - analysis_agent
      - risk_agent
      - advisory_agent
      - review_agent
    tasks:
      - data_task
      - analysis_task
      - risk_task
      - advisory_task
      - review_task
    process: sequential
    verbose: true


  financial_qa_crew:   
    name: Financial QnA Crew
    agents:
      - qa_agent
    tasks:
      - qa_task
    process: sequential
    verbose: true